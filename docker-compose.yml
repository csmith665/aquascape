services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    expose:
      - "3000"
    environment:
      # Compose variable substitution: values come from .env (gitignored) or the shell.
      # No defaults are provided for credentials — the stack will refuse to start
      # without a real .env, which is intentional.
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-aquascape}
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.aquascape.rule=Host(`${DOMAIN:-aquascape.local}`)
      - traefik.http.routers.aquascape.entrypoints=websecure
      - traefik.http.routers.aquascape.tls.certresolver=le
      - traefik.http.services.aquascape.loadbalancer.server.port=3000

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-aquascape}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  proxy:
    external: true

volumes:
  pgdata:
