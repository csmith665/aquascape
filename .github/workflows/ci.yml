name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: lint, typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # No package-lock.json is committed; npm install resolves the tree.
      - run: npm install --no-audit --no-fund
      - run: npx prisma generate
      # typecheck runs first on the committed strict tsconfig; next lint later
      # rewrites tsconfig (skipLibCheck/strict), so build is run before lint.
      - run: npm run typecheck
      - run: npm run build
      - run: npm run lint
